<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Nexus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="forgot-password.css" />
</head>
<body>

  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

  <main class="page-center">
    <article class="auth-card">

      <header class="auth-card__header">
        <div class="brand" aria-label="Nexus">
          <span class="brand__mark">N</span>
          <span class="brand__name">Nexus</span>
        </div>
        <h1 class="auth-card__title">Forgot Password</h1>
        <p class="auth-card__subtitle">Enter your registered email address to receive a password reset link.</p>
      </header>

      <form class="auth-form" id="forgotForm">

        <div class="field-group">
          <label class="field-group__label" for="forgot-email">Email address</label>
          <div class="field-group__input-wrap">
            <span class="field-group__icon" aria-hidden="true">
              <i class="fa-regular fa-envelope"></i>
            </span>
            <input
              class="field-group__input"
              type="email"
              id="forgot-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <button class="btn-primary" type="submit">
          <span class="btn-primary__text">Send Reset Link</span>
          <span class="btn-primary__arrow" aria-hidden="true">
            <i class="fa-solid fa-arrow-right"></i>
          </span>
        </button>

      </form>

      <p class="auth-card__footer">
        Remember your password?
        <a class="auth-link" href="../index.html">Back to Login</a>
      </p>

    </article>
  </main>

  <script type="module" src="forgot-password.js"></script>
</body>
</html>
