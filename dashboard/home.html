<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Nexus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="home.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar__inner">
      <div class="navbar__left">
        <button class="navbar__toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="navbar__brand">
          <span class="navbar__logo">N</span>
          <span class="navbar__name">Nexus</span>
        </div>
      </div>
      <div class="navbar__right">
        <div class="navbar__user">
          <span class="navbar__email" id="navbarEmail">-</span>
          <span class="navbar__avatar" id="navbarAvatar">
            <i class="fa-regular fa-user"></i>
          </span>
        </div>
        <button class="navbar__logout" id="logoutBtn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span class="navbar__logout-text">Logout</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__inner">
        <div class="sidebar__menu">
          <a class="sidebar__item sidebar__item--active" href="#">
            <span class="sidebar__icon"><i class="fa-solid fa-house"></i></span>
            <span class="sidebar__label">Dashboard</span>
          </a>
        </div>
        <button class="sidebar__item sidebar__item--logout" id="sidebarLogoutBtn">
          <span class="sidebar__icon"><i class="fa-solid fa-right-from-bracket"></i></span>
          <span class="sidebar__label">Logout</span>
        </button>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <div class="dashboard">

        <div class="card card--welcome">
          <div class="card__icon"><i class="fa-regular fa-hand-wave"></i></div>
          <h1 class="card__title">Welcome Back</h1>
          <p class="card__subtitle" id="userEmail">—</p>
        </div>

        <div class="card card--info">
          <div class="card__header">
            <span class="card__header-icon"><i class="fa-regular fa-envelope"></i></span>
            <span class="card__header-label">Email Address</span>
          </div>
          <p class="card__value" id="userEmailInfo">—</p>
        </div>

        <div class="card card--info">
          <div class="card__header">
            <span class="card__header-icon"><i class="fa-solid fa-fingerprint"></i></span>
            <span class="card__header-label">Firebase UID</span>
          </div>
          <p class="card__value card__value--mono" id="userUid">—</p>
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="home.js"></script>
</body>
</html>
